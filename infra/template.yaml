AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless stack for drag-and-drop AWS Translate demo

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - '*'
        AllowMethods:
          - GET
          - POST

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - POST
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 300

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UploadBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${UploadBucket.Arn}/*'
              - !GetAtt UploadBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

  TranslateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  CreateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/dist
      Handler: createUploadUrl.handler
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3WritePolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
      Events:
        UploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /upload-url
            Method: POST

  GetStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/dist
      Handler: getStatus.handler
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
      Events:
        Status:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /status/{jobId}
            Method: GET

  ProcessUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/dist
      Handler: processUpload.handler
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadBucket
        - S3WritePolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
                - translate:TranslateDocument
                - comprehend:DetectDominantLanguage
              Resource: '*'
      Events:
        UploadEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref UploadBucket
                object:
                  key:
                    - prefix: raw/

  ProcessUploadPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessUploadFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ProcessUploadFunctionUploadEvent.Arn

Outputs:
  ApiUrl:
    Description: Invoke URL for HTTP API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  BucketName:
    Description: Bucket used for uploads and translations
    Value: !Ref UploadBucket
  TableName:
    Description: DynamoDB table storing translation jobs
    Value: !Ref TranslateTable
