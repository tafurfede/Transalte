AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless stack for drag-and-drop AWS Translate demo

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - '*'
        AllowMethods:
          - GET
          - POST

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - POST
              - GET
              - HEAD
              - PUT
            AllowedHeaders:
              - '*'
            MaxAge: 300

  TranslateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  CreateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend-dotnet/src/Functions.Http
      Handler: Functions.Http::TranslateDemo.Functions.Http.UploadFunction::Handler
      Runtime: dotnet8
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3WritePolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
      Events:
        UploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /upload-url
            Method: POST

  GetStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend-dotnet/src/Functions.Http
      Handler: Functions.Http::TranslateDemo.Functions.Http.StatusFunction::Handler
      Runtime: dotnet8
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
      Events:
        Status:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /status/{jobId}
            Method: GET

  ProcessJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend-dotnet/src/Functions.Http
      Handler: Functions.Http::TranslateDemo.Functions.Http.ProcessJobFunction::Handler
      Runtime: dotnet8
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadBucket
        - S3WritePolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
                - translate:TranslateDocument
                - comprehend:DetectDominantLanguage
              Resource: '*'
      Events:
        ProcessJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /process/{jobId}
            Method: POST

  ProcessUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend-dotnet/src/Functions.S3
      Handler: Functions.S3::TranslateDemo.Functions.S3.ProcessUploadFunction::Handler
      Runtime: dotnet8
      Environment:
        Variables:
          BUCKET: !Ref UploadBucket
          TABLE_NAME: !Ref TranslateTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadBucket
        - S3WritePolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref TranslateTable
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
                - translate:TranslateDocument
                - comprehend:DetectDominantLanguage
              Resource: '*'

Outputs:
  ApiUrl:
    Description: Invoke URL for HTTP API
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  BucketName:
    Description: Bucket used for uploads and translations
    Value: !Ref UploadBucket
  TableName:
    Description: DynamoDB table storing translation jobs
    Value: !Ref TranslateTable
